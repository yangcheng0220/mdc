name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org # writes the .npmrc npm publish reads the token from

      # The tag is the release trigger, but package.json is what npm publishes as.
      # Refuse to publish if they disagree — a mismatched tag ships the wrong version.
      - name: Verify tag matches package version
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$VERSION" != "$TAG" ]; then
            echo "Tag v$TAG does not match package.json version $VERSION"
            exit 1
          fi

      - run: npm ci

      # Build before publish — a red build must never reach npm.
      - run: npm run build

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Release notes are the matching CHANGELOG section verbatim — no commit scraping.
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { flag=1; next }
            /^## / && flag { flag=0 }
            flag { print }
          ' CHANGELOG.md | sed -e '/./,$!d' > notes.md

          if [ -s notes.md ]; then
            gh release create "$GITHUB_REF_NAME" --verify-tag --title "$GITHUB_REF_NAME" --notes-file notes.md --latest
          else
            gh release create "$GITHUB_REF_NAME" --verify-tag --title "$GITHUB_REF_NAME" --generate-notes --latest
          fi
