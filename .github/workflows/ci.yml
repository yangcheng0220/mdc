name: CI

on:
  push:
    branches: [main]
  pull_request:

# A newer push to the same ref makes the in-flight run obsolete.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  signoff:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        # 20 is the floor declared in `engines`; 22 is what development runs on.
        node: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci

      # `dist/` is gitignored, so every check downstream needs this first.
      - run: npm run build

      - run: npm run typecheck

      - run: npm run typecheck:web

      - run: npm test

      - run: npm run knip
